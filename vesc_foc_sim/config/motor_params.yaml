# VESC FOC Simulator — Motor & Controller Parameters
# Source: sim/2026_03_03.xml (VESC Tool export) + derived values
# All electrical parameters are measured/validated on real hardware via VESC Tool.
# Mechanical parameters are estimates; refine when chassis data is available.

# ── Namespace prefix used by all three nodes ───────────────────────────────────
# Each node declares params under its own name; the yaml tree below is flat so
# every node can read every key (ROS2 loads the whole yaml into the node's ns).

/**:
  ros__parameters:

    # ── Sim profile ───────────────────────────────────────────
    profile: "sine"   # "sine", "speed_profile"
    freq_hz: 2.0               # used only if profile == "sine"
    publish_rate_hz: 1000.0

    # ── Motor electrical (from XML: foc_motor_* fields) ────────────────────────
    R:       0.03       # [Ω]  phase resistance          (foc_motor_r)
    L:       9.0e-5     # [H]  mean inductance (Ld+Lq)/2 (foc_motor_l)
    Ld:      7.0e-5     # [H]  d-axis inductance  = L − ld_lq_diff/2
    Lq:      1.1e-4     # [H]  q-axis inductance  = L + ld_lq_diff/2
    lambda:  0.0115     # [Wb] rotor flux linkage        (foc_motor_flux_linkage)
    p:       4          # [-]  pole pairs                 (si_motor_poles/2 = 8/2)

    # ── Mechanical (estimated; refine with chassis team data) ──────────────────
    J_tot:    7.5e-4    # [kg·m²] J_motor + J_wheel/n² = 5e-4 + 2.5e-5
    tau_load: 0.0       # [Nm] external load torque — zero for open-loop current test

    # ── Drive train (from XML: si_* fields) ────────────────────────────────────
    gear_ratio:    10.0   # [-]  (si_gear_ratio)
    wheel_radius:  0.1015 # [m]  si_wheel_diameter/2 = 0.203/2

    # ── FOC controller (from XML: foc_current_*, foc_pll_*, foc_observer_*) ───
    current_kp:     0.4        # (foc_current_kp)
    current_ki:     400.0      # (foc_current_ki)
    observer_gain:  8140000.0  # (foc_observer_gain)  — used in Phase 2
    pll_kp:         2000.0     # (foc_pll_kp)
    pll_ki:         30000.0    # (foc_pll_ki)
    current_filter: 0.15       # (foc_current_filter_const) LP constant for id/iq filters

    # ── Field weakening (from XML: foc_fw_*) ────────────────────────────────────
    fw_current_max: 48.0   # [A]  (foc_fw_current_max)
    fw_duty_start:  0.9    # [-]  (foc_fw_duty_start)  — FW starts at 90% duty
    fw_ramp_time:   0.2    # [s]  (foc_fw_ramp_time)

    # ── Limits (from XML: l_* fields) ───────────────────────────────────────────
    l_current_max:    110.0   # [A]   motor traction limit
    l_current_min:   -110.0   # [A]   motor regen limit
    l_in_current_max:  80.0   # [A]   battery traction limit
    l_in_current_min: -80.0   # [A]   battery regen limit
    l_abs_current_max: 150.0  # [A]   absolute hardware limit
    l_max_erpm:      70000.0  # [ERPM]
    l_min_vin:        35.0    # [V]
    l_max_vin:        70.0    # [V]
    l_max_duty:        0.95   # [-]   (l_max_duty)
    cc_min_current:    0.0    # [A]   minimum current for FW activation

    # ── Temperature limits (from XML: l_temp_* fields) ──────────────────────────
    # Set t_fet / t_motor above l_temp_*_start to test derating behaviour.
    t_fet:   25.0    # [°C] simulated FET temperature
    t_motor: 25.0    # [°C] simulated motor winding temperature
    l_temp_fet_start:    85.0   # [°C] FET derating begins
    l_temp_fet_end:     100.0   # [°C] FET fault and zero current
    l_temp_motor_start:  85.0   # [°C] motor derating begins
    l_temp_motor_end:   100.0   # [°C] motor fault and zero current
    l_temp_accel_dec:     0.15  # [-]  accel-only derating factor

    # ── Battery / power limits (from XML) ────────────────────────────────────────
    l_battery_cut_start:       47.0      # [V]  input current taper start
    l_battery_cut_end:         42.0      # [V]  full input current cutoff
    l_battery_regen_cut_start: 1000.0    # [V]  regen cutoff start (disabled)
    l_battery_regen_cut_end:   1100.0    # [V]  regen full cutoff  (disabled)
    l_watt_max:   1500000.0              # [W]  max power (effectively unlimited)
    l_watt_min:  -1500000.0              # [W]  min power (effectively unlimited)

    # ── Speed / duty derating (from XML; value 1.0 disables taper) ───────────────
    l_duty_start:  1.0    # [-]   duty derating start  (1.0 = disabled)
    l_erpm_start:  1.0    # [-]   RPM derating start   (1.0 = disabled)
    l_min_erpm:   -70000.0  # [ERPM] minimum RPM limit

    # ── Input current mapping (from XML) ─────────────────────────────────────────
    l_in_current_map_start:  1.0   # [-]   input→iq mapping start (1.0 = disabled)
    l_in_current_map_filter: 0.01  # [-]   LP filter constant for i_in measurement

    # ── Start current decrease (from XML; foc_start_curr_dec=1.0 = disabled) ─────
    foc_start_curr_dec:     1.0     # [-]   start current factor  (1.0 = disabled)
    foc_start_curr_dec_rpm: 2500.0  # [ERPM] RPM threshold for start current ramp

    # ── Simulation control ───────────────────────────────────────────────────────
    sim_dt_s:      0.0001     # [s]  integration timestep = 100 µs (10 kHz)
    vbus:          51.8       # [V]  nominal bus voltage (14S × 3.7 V)
    timeout_s:     0.1        # [s]  watchdog: coast if no iq_ref within this period

    # Phase 1: use real angle from plant (perfect encoder).
    # Set to true in Phase 2 to switch to observer estimate.
    use_observer:  false

    # ── ECU sim profile ──────────────────────────────────────────────────────────
    # sine / sine_coast profiles
    iq_ref_amplitude:  50.0   # [A]  sine amplitude
    t_start_s:          0.5   # [s]  delay before profile starts
    sine_duration_s:    2.0   # [s]  (sine_coast) active sine window per cycle
    coast_duration_s:   1.0   # [s]  (sine_coast) silent window — triggers controller watchdog

    # Closed-loop speed profile
    kp_speed:    0.5    # [A·s/rad]  proportional gain
    ki_speed:    2.0    # [A/rad]    integral gain
    # l_current_max is already declared above (110.0 A) — shared with controller

    speed_waypoints:
      t_s:                [0.0, 0.5, 2.5, 3.0, 5.0, 5.5]
      omega_target_radps: [0.0, 500.0, 500.0, 200.0, 200.0, 0.0]
